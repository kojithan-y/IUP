name: CI/CD Pipeline to AWS ECS (Teacher)

on:
  push:
    branches: ['main', 'master']

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t Kojithan/teacher-service:latest .
          docker push Kojithan/teacher-service:latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Restart AWS ECS Service
        run: |
          aws ecs update-service --cluster friendly-gorilla-mti6zz --service teacher-service-task --force-new-deployment
